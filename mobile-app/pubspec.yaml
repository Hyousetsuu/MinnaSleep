name: minna_sleep
description: Track. Analyze. Sleep Better.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^14.2.0
  # Supabase (Auth + Session only on client)
  supabase_flutter: ^2.5.0
  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0
  # HTTP Client
  dio: ^5.4.3
  # UI
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1
  # Image
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.2
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
