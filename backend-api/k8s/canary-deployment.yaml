apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: minnasleep-api
spec:
  replicas: 5
  strategy:
    canary:
      # Phase 2: Canary Release YAML strategies (5% -> 25% -> 100%)
      steps:
      - setWeight: 5
      - pause: {duration: 10m} # Wait and observe for 5xx/Latency spikes
      - setWeight: 25
      - pause: {duration: 1h}
      - setWeight: 100
      analysis:
        templates:
        - templateName: success-rate
        - templateName: latency-p99
        - templateName: dlq-spike-monitor
        args:
        - name: service-name
          value: minnasleep-api
